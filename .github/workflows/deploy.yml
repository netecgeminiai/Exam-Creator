name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: exam-translator-api      # 👈 cámbialo si usas otro nombre
  ACR_NAME: examtranslatoracr                 # 👈 tu Azure Container Registry
  RESOURCE_GROUP: exam-translator-rg
  STATIC_WEBAPP_NAME: exam-translator-ui

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & push Docker image (Backend)
  # ─────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push image
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/exam-translator-backend:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          # Also tag as latest
          docker tag $IMAGE ${{ env.ACR_NAME }}.azurecr.io/exam-translator-backend:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/exam-translator-backend:latest

      - name: Set App Settings (Turso + API keys)
        run: |
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              DATABASE_URL="${{ secrets.TURSO_DATABASE_URL }}" \
              TURSO_AUTH_TOKEN="${{ secrets.TURSO_AUTH_TOKEN }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              WEBSITES_PORT=8000

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/exam-translator-backend:${{ github.sha }}

  # ─────────────────────────────────────────────
  # 2. Build & deploy Frontend (Static Web App)
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
        run: npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true
